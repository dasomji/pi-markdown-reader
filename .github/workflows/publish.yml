name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - "package.json"
      - "package-lock.json"
      - "src/**"
      - "README.md"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm test --if-present
      - run: npm pack --dry-run

      - name: Check whether this version is already published
        id: version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet; publishing."
          fi

      - name: Publish to npm
        if: steps.version.outputs.published == 'false'
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME="${{ steps.version.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.version.outputs.package_version }}"

          for attempt in 1 2 3; do
            echo "npm publish attempt $attempt for $PACKAGE_NAME@$PACKAGE_VERSION"
            if npm publish --access public --verbose; then
              exit 0
            fi

            if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
              echo "$PACKAGE_NAME@$PACKAGE_VERSION is now published despite npm publish returning a non-zero exit code."
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "npm publish failed; retrying in 20 seconds."
              sleep 20
            fi
          done

          echo "npm publish failed after 3 attempts."
          exit 1
